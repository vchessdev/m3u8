name: Tự động cào lịch World Cup EPG

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kiểm tra mã nguồn công việc
      uses: actions/checkout@v4

    - name: Cài đặt môi trường PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Chạy script cào dữ liệu và tạo file JSON
      run: |
        php -r '
        date_default_timezone_set("Asia/Ho_Chi_Minh");
        $today = date("Y-m-d");
        $api_url = "https://vnepg.site/api/schedule/vtv6hd";
        $vtv6_m3u8 = "https://devda.undo.it/Stream/index.php?id=vtv6&ext=.m3u8";
        
        $ch = curl_init();
        curl_setopt($ch, CURLOPT_URL, $api_url);
        curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
        curl_setopt($ch, CURLOPT_USERAGENT, "Mozilla/5.0 (Windows NT 10.0; Win64; x64)");
        curl_setopt($ch, CURLOPT_TIMEOUT, 30);
        $res = curl_exec($ch);
        curl_close($ch);
        
        $api_data = json_decode($res, true);
        $matches = [];
        
        // Trỏ chính xác vào mảng "items" từ API
        if (isset($api_data["items"]) && is_array($api_data["items"])) {
            foreach ($api_data["items"] as $prog) {
                $title = $prog["title"] ?? "";
                $desc = $prog["desc"] ?? "";
                
                // Ghép tiêu đề và mô tả lại để lọc cho chắc ăn
                $full_text = $title . " " . $desc;
                
                // Lọc theo các trận Trực tiếp hoặc Tường thuật có chữ World Cup hoặc Bóng đá
                if (stripos($full_text, "World Cup") !== false || stripos($full_text, "Bóng đá") !== false) {
                    
                    // Xử lý chuyển đổi timestamp mili-giây (chia cho 1000)
                    $start_ts = isset($prog["startMs"]) ? intval($prog["startMs"] / 1000) : 0;
                    $stop_ts = isset($prog["stopMs"]) ? intval($prog["stopMs"] / 1000) : 0;
                    
                    if ($start_ts > 0 && $stop_ts > 0) {
                        $match_date = date("Y-m-d", $start_ts);
                        
                        // Nếu trùng ngày hôm nay, bốc lịch bỏ vào file
                        if ($match_date === $today) {
                            $matches[] = [
                                "id" => "epg_wc_" . uniqid(),
                                "day" => $today,
                                "start_time" => date("H:i", $start_ts),
                                "end_time" => date("H:i", $stop_ts),
                                "m3u8_url" => $vtv6_m3u8,
                                "created_at" => date("Y-m-d H:i:s") . " (GitHub Actions: " . ($desc ? $desc : $title) . ")"
                            ];
                        }
                    }
                }
            }
        }
        
        file_put_contents("worldcup.json", json_encode($matches, JSON_UNESCAPED_UNICODE | JSON_PRETTY_PRINT));
        echo "=== KẾT QUẢ CÀO ==_\n";
        echo "Đã tìm thấy và ghi đè " . count($matches) . " trận đấu vào worldcup.json\n";
        '

    - name: Đẩy file JSON mới lên Repo GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add worldcup.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Tự động cập nhật lịch bóng đá ngày $(date +'%Y-%m-%d')" && git push)
