name: Tự động cào lịch World Cup EPG

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt NodeJS và Puppeteer
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Cài đặt thư viện Puppeteer
      run: npm install puppeteer

    - name: Chạy script giả lập trình duyệt cào JSON
      run: |
        node -e "
        const puppeteer = require('puppeteer');
        const fs = require('fs');

        (async () => {
            console.log('🚀 Đang khởi động trình duyệt giả lập để vượt Cloudflare...');
            const browser = await puppeteer.launch({
                headless: true,
                args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            // Giả lập User-Agent của trình duyệt máy tính thật
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');

            try {
                console.log('🔄 Đang truy cập vào API vnepg.site...');
                await page.goto('https://vnepg.site/api/schedule/vtv6hd', { waitUntil: 'networkidle2', timeout: 60000 });
                
                // Lấy nội dung văn bản hiển thị trên trang (chuỗi JSON thô)
                const rawText = await page.evaluate(() => document.body.innerText);
                
                // Thử giải mã chuỗi JSON kiểm tra cấu trúc
                const apiData = JSON.parse(rawText);
                
                if (!apiData || !apiData.items) {
                    throw new Error('Cấu trúc JSON nhận được không có mục items');
                }
                
                console.log('✅ Đã vượt Cloudflare và lấy dữ liệu thành công!');
                
                // Định dạng múi giờ Việt Nam để lọc ngày
                const tzOffset = 7 * 60 * 60 * 1000; // GMT+7
                const todayStr = new Date(Date.now() + tzOffset).toISOString().split('T')[0];
                
                const vtv6_m3u8 = 'https://devda.undo.it/Stream/index.php?id=vtv6&ext=.m3u8';
                const matches = [];

                for (const prog of apiData.items) {
                    const title = prog.title || '';
                    const desc = prog.desc || '';
                    const fullText = (title + ' ' + desc).toLowerCase();
                    
                    // Lọc theo từ khóa (Bắt cả lỗi chính tả Worl Cup)
                    if (fullText.includes('world') || fullText.includes('worl') || fullText.includes('bóng') || fullText.includes('thể thao')) {
                        const startTs = prog.startMs ? Math.floor(prog.startMs / 1000) : 0;
                        const stopTs = prog.stopMs ? Math.floor(prog.stopMs / 1000) : 0;
                        
                        if (startTs > 0 && stopTs > 0) {
                            const matchDateStr = new Date((startTs * 1000) + tzOffset).toISOString().split('T')[0];
                            
                            // Chỉ lấy trận đấu thuộc ngày hôm nay
                            if (matchDateStr === todayStr) {
                                // Hàm format định dạng giờ H:i
                                const formatTime = (ts) => {
                                    const d = new Date((ts * 1000) + tzOffset);
                                    return String(d.getUTCHours()).padStart(2, '0') + ':' + String(d.getUTCMinutes()).padStart(2, '0');
                                };

                                matches.push({
                                    id: 'epg_wc_' + Math.random().toString(36).substr(2, 9),
                                    day: todayStr,
                                    start_time: formatTime(startTs),
                                    end_time: formatTime(stopTs),
                                    m3u8_url: vtv6_m3u8,
                                    created_at: new Date(Date.now() + tzOffset).toISOString().replace('T', ' ').substr(0, 19) + ' (Puppeteer: ' + (desc ? desc : title) + ')'
                                });
                            }
                        }
                    }
                }

                // Ghi dữ liệu sạch vào file worldcup.json
                fs.writeFileSync('worldcup.json', JSON.stringify(matches, null, 4), 'utf8');
                console.log('=== KẾT QUẢ CÀO TỪ TRÌNH DUYỆT ===');
                console.log('Đã lọc và ghi thành công ' + matches.length + ' trận đấu vào file worldcup.json');

            } catch (error) {
                console.error('❌ LỖI TRONG QUÁ TRÌNH CHẠY SCRIPT:', error.message);
                process.exit(1);
            } finally {
                await browser.close();
            }
        })();
        "

    - name: Đẩy file JSON mới lên Repo GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add worldcup.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync lịch bằng Puppeteer ngày $(date +'%Y-%m-%d')" && git push)
