name: Tự động cào lịch World Cup EPG

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4

    - name: Ép múi giờ hệ thống VN
      run: |
        sudo ln -sf /usr/share/zoneinfo/Asia/Ho_Chi_Minh /etc/localtime
        echo "Asia/Ho_Chi_Minh" | sudo tee /etc/timezone

    - name: Cài đặt PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Chạy kịch bản vượt Cloudflare bằng Cổng Xoay IP
      run: |
        php -r '
        date_default_timezone_set("Asia/Ho_Chi_Minh");
        $today = date("Y-m-d");
        $vtv6_m3u8 = "https://devda.undo.it/Stream/index.php?id=vtv6&ext=.m3u8";
        $target_url = "https://vnepg.site/api/schedule/vtv6hd";
        
        // CÁC CỔNG KHÔNG BỊ TRÙNG IP DATACENTER VÀ TỰ GIẢI MÃ CLOUDFLARE
        $proxies = [
            "https://corsproxy.io/?" . urlencode($target_url),
            "https://api.codetabs.com/v1/proxy/?quest=" . urlencode($target_url)
        ];
        
        $api_data = null;
        foreach ($proxies as $url) {
            echo "🔄 Đang đi đường vòng qua cổng chuyên dụng: $url\n";
            $ch = curl_init();
            curl_setopt($ch, CURLOPT_URL, $url);
            curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
            curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);
            curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, false);
            curl_setopt($ch, CURLOPT_TIMEOUT, 20);
            // Bơm Header giả lập như trình duyệt xịn đang gọi qua proxy
            curl_setopt($ch, CURLOPT_HTTPHEADER, [
                "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0",
                "Accept: application/json, text/plain, */*",
                "Accept-Language: vi-VN,vi;q=0.9,en-US;q=0.8,en;q=0.7"
            ]);
            $res = curl_exec($ch);
            curl_close($ch);
            
            $decoded = json_decode($res, true);
            if (is_array($decoded) && isset($decoded["items"])) {
                $api_data = $decoded;
                echo "✅ ĐÃ BẺ GÃY CLOUDFLARE THÀNH CÔNG!\n";
                break;
            }
        }
        
        if (!$api_data) {
            echo "⚠️ Cảnh báo: Các cổng tự động đều bị Cloudflare siết chặt.\n";
            echo "🤖 Kích hoạt chế độ cứu hộ: Đọc dữ liệu trực tiếp thô từ hệ thống fallback...\n";
            // Nếu tạch hết do Cloudflare chặn gắt hôm nay, tải thẳng link dự phòng dạng thô
            $res = @file_get_contents("https://api.codetabs.com/v1/proxy/?quest=" . urlencode($target_url));
            $api_data = json_decode($res, true);
        }
        
        if (!is_array($api_data) || !isset($api_data["items"])) {
            die("❌ THẤT BẠI CHÍ MẠNG: Cloudflare khóa toàn bộ lối đi. Kết thúc build để bảo vệ file cũ.\n");
        }
        
        $matches = [];
        foreach ($api_data["items"] as $prog) {
            $title = $prog["title"] ?? "";
            $desc = $prog["desc"] ?? "";
            $full_text = $title . " " . $desc;
            
            // Quét từ khóa thông minh chấp cả lỗi chính tả "Worl Cup"
            if (stripos($full_text, "World") !== false || stripos($full_text, "Worl") !== false || stripos($full_text, "Bóng") !== false || stripos($full_text, "thể thao") !== false) {
                
                $start_ts = isset($prog["startMs"]) ? intval($prog["startMs"] / 1000) : 0;
                $stop_ts = isset($prog["stopMs"]) ? intval($prog["stopMs"] / 1000) : 0;
                
                if ($start_ts > 0 && $stop_ts > 0) {
                    $match_date = date("Y-m-d", $start_ts);
                    
                    if ($match_date === $today) {
                        $matches[] = [
                            "id" => "epg_wc_" . uniqid(),
                            "day" => $today,
                            "start_time" => date("H:i", $start_ts),
                            "end_time" => date("H:i", $stop_ts),
                            "m3u8_url" => $vtv6_m3u8,
                            "created_at" => date("Y-m-d H:i:s") . " (" . ($desc ? $desc : $title) . ")"
                        ];
                    }
                }
            }
        }
        
        file_put_contents("worldcup.json", json_encode($matches, JSON_UNESCAPED_UNICODE | JSON_PRETTY_PRINT));
        echo "=== KẾT QUẢ ĐÓNG GÓI ===\n";
        echo "Tìm thấy và nạp " . count($matches) . " trận đấu phù hợp vào worldcup.json\n";
        '

    - name: Commit và Push file JSON
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add worldcup.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Đồng bộ lịch EPG lách Cloudflare ngày $(date +'%Y-%m-%d')" && git push)
